name: Build SSHLogin APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [ arm64-v8a, x86_64 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Accept all licenses automatically
          accept-android-sdk-licenses: true
          # Install NDK version required by Termux
          ndk: "22.1.7171670"
          # Also install platform android-30
          platforms: android-30
          build-tools: "30.0.3"

      - name: Apply minimal patches
        run: |
          cd termux-app
          for patch in ../patches/*.patch; do
            echo "▶ Applying: $(basename $patch)"
            if git apply "$patch"; then
              echo "  ✅ Applied"
            else
              echo "  ⚠️  Already applied or failed — skipping"
            fi
          done

      - name: Build Debug APK (${{ matrix.arch }})
        run: |
          cd termux-app
          # Build only the specified ABI variant
          ./gradlew assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: sshlogin-${{ matrix.arch }}-debug
          path: termux-app/app/build/outputs/apk/debug/*.apk
