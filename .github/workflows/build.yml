name: Build SSHLogin APK

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [ arm64-v8a, x86_64 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq android-sdk android-sdk-platform-tools-common > /dev/null

      - name: Accept licenses & install NDK (side-by-side)
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          yes | sdkmanager "ndk;22.1.7171670" > /dev/null 2>&1 || true
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Apply minimal patches
        run: |
          cd termux-app
          for patch in ../patches/*.patch; do
            echo "▶ Applying: $(basename $patch)"
            if git apply "$patch"; then
              echo "  ✅ Applied"
            else
              echo "  ⚠️  Already applied or failed — skipping"
            fi
          done

      - name: Build Debug APK (${{ matrix.arch }})
        run: |
          cd termux-app
          ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/lib/android-sdk

      - name: Upload artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: vps-connect-${{ matrix.arch }}-debug
          path: termux-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            termux-app/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
